<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FF6B35" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Eventy Admin" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon-512.svg" />
  <title>Eventy Admin — Portail d'administration sécurisé</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF6B35;
      --primary-dark: #E55820;
      --primary-light: #FF8F5E;
      --secondary: #22C55E;
      --secondary-alt: #06D6A0;
      --tertiary: #0077B6;
      --tertiary-light: #48CAE4;
      --gold: #DAA520;
      --bg-dark: #0A1628;
      --bg-darker: #0F1F3A;
      --surface: #1a2744;
      --surface-light: #243653;
      --text-light: #F1F5F9;
      --text-secondary: #94A3B8;
      --coral: #E63946;
      --mint: #06D6A0;
      --violet: #7B2FF7;
      --radius: 14px;
      --radius-lg: 20px;
      --border-glow: rgba(255, 107, 53, 0.2);
    }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
      color: var(--text-light);
      overflow-x: hidden;
    }

    /* Particle background */
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(20px); } }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 280px;
      background: linear-gradient(180deg, var(--bg-dark) 0%, #0D1B2A 100%);
      border-right: 1px solid rgba(255, 107, 53, 0.1);
      color: var(--text-light);
      z-index: 40;
      transition: transform 0.3s ease;
      overflow-y: auto;
      backdrop-filter: blur(10px);
    }
    .sidebar-logo {
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 107, 53, 0.15);
    }
    .sidebar-logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary-alt) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
    }
    .sidebar-logo h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .sidebar-logo span {
      font-size: 10px;
      color: var(--text-secondary);
      display: block;
      margin-top: -2px;
    }
    .nav-section {
      padding: 20px 12px 12px;
    }
    .nav-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      padding: 0 12px;
      font-weight: 600;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 13px;
      color: var(--text-secondary);
      position: relative;
      margin-bottom: 4px;
    }
    .nav-item:hover {
      background: rgba(255, 107, 53, 0.08);
      color: var(--text-light);
    }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.25) 0%, rgba(34, 197, 94, 0.15) 100%);
      color: var(--primary);
      font-weight: 600;
      border-right: 2px solid var(--primary);
    }
    .nav-item .badge {
      position: absolute;
      right: 8px;
      background: var(--coral);
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }
    .nav-item .icon {
      width: 20px;
      text-align: center;
      font-size: 16px;
    }
    .sidebar-user {
      padding: 16px;
      border-top: 1px solid rgba(255, 107, 53, 0.15);
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--tertiary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }
    .sidebar-user-info {
      flex: 1;
    }
    .sidebar-user-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
    }
    .sidebar-user-role {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Main content */
    .main {
      margin-left: 280px;
      min-height: 100vh;
      padding: 0;
    }
    .topbar {
      background: rgba(26, 39, 68, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 107, 53, 0.1);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-left h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-light);
    }
    .topbar-breadcrumb {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-icon-btn {
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.2);
      color: var(--text-light);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      position: relative;
    }
    .topbar-icon-btn:hover {
      background: rgba(255, 107, 53, 0.2);
      border-color: rgba(255, 107, 53, 0.4);
    }
    .notification-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: var(--coral);
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .topbar-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--tertiary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    .hamburger {
      display: none;
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.2);
      color: var(--text-light);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
    }

    .content {
      padding: 28px;
    }

    /* Cards */
    .card {
      background: rgba(26, 39, 68, 0.4);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 24px;
      border: 1px solid rgba(255, 107, 53, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .card:hover {
      border-color: rgba(255, 107, 53, 0.2);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-light);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(26, 39, 68, 0.5);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 20px;
      border: 1px solid rgba(255, 107, 53, 0.1);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary-alt));
    }
    .stat-card:hover {
      border-color: rgba(255, 107, 53, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(255, 107, 53, 0.2);
    }
    .stat-card.urgent {
      border-color: rgba(230, 57, 70, 0.3);
    }
    .stat-card .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(255, 107, 53, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }
    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-light);
    }
    .stat-card .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .stat-card .stat-trend {
      font-size: 12px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-card .stat-trend.up {
      color: var(--mint);
    }
    .stat-card .stat-trend.down {
      color: var(--coral);
    }

    /* Tables */
    .table-container {
      overflow-x: auto;
      border-radius: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 14px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 107, 53, 0.1);
    }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 107, 53, 0.05);
      font-size: 14px;
      color: var(--text-light);
    }
    tr:hover td {
      background: rgba(255, 107, 53, 0.05);
    }

    /* Badges */
    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-status.active,
    .badge-status.published,
    .badge-status.completed,
    .badge-status.approved,
    .badge-status.confirmed {
      background: rgba(34, 197, 94, 0.15);
      color: var(--secondary);
    }
    .badge-status.pending,
    .badge-status.waiting {
      background: rgba(218, 165, 32, 0.15);
      color: var(--gold);
    }
    .badge-status.cancelled,
    .badge-status.rejected,
    .badge-status.suspended,
    .badge-status.open {
      background: rgba(230, 57, 70, 0.15);
      color: var(--coral);
    }
    .badge-status.ongoing,
    .badge-status.in_progress {
      background: rgba(0, 119, 182, 0.15);
      color: var(--tertiary-light);
    }
    .badge-status.admin {
      background: rgba(123, 47, 247, 0.15);
      color: var(--violet);
    }
    .badge-status.pro {
      background: rgba(255, 107, 53, 0.15);
      color: var(--primary-light);
    }
    .badge-status.client {
      background: rgba(0, 119, 182, 0.15);
      color: var(--tertiary-light);
    }

    /* Buttons */
    .btn {
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(255, 107, 53, 0.4);
    }
    .btn-secondary {
      background: linear-gradient(135deg, var(--secondary-alt), var(--secondary));
      color: white;
      box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
    }
    .btn-secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(34, 197, 94, 0.4);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 107, 53, 0.3);
      color: var(--text-light);
    }
    .btn-outline:hover {
      background: rgba(255, 107, 53, 0.1);
      border-color: rgba(255, 107, 53, 0.5);
    }
    .btn-danger {
      background: rgba(230, 57, 70, 0.15);
      color: var(--coral);
      border: 1px solid rgba(230, 57, 70, 0.3);
    }
    .btn-danger:hover {
      background: rgba(230, 57, 70, 0.25);
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255, 107, 53, 0.05);
      border: 1px solid rgba(255, 107, 53, 0.1);
      color: var(--text-secondary);
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-color: var(--primary);
      color: white;
    }
    .tab:hover:not(.active) {
      border-color: rgba(255, 107, 53, 0.3);
      color: var(--text-light);
    }

    /* Search & Filter */
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 11px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 107, 53, 0.2);
      font-size: 13px;
      font-family: inherit;
      background: rgba(26, 39, 68, 0.5);
      color: var(--text-light);
      transition: all 0.2s ease;
    }
    .search-input::placeholder {
      color: var(--text-secondary);
    }
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.2);
      background: rgba(26, 39, 68, 0.7);
    }
    select.search-input {
      cursor: pointer;
    }

    /* Modules grid */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .module-card {
      background: rgba(26, 39, 68, 0.5);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 24px;
      border: 1px solid rgba(255, 107, 53, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .module-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 107, 53, 0.3);
      box-shadow: 0 16px 48px rgba(255, 107, 53, 0.2);
    }
    .module-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .module-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(34, 197, 94, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .module-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-light);
    }
    .module-status {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.15);
      color: var(--secondary);
    }
    .module-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .module-stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .module-stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .module-stat-row .value {
      font-weight: 700;
      color: var(--text-light);
    }

    /* Alert bar */
    .alert-bar {
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      border-left: 4px solid;
    }
    .alert-bar.danger {
      background: rgba(230, 57, 70, 0.1);
      border-color: var(--coral);
      color: var(--coral);
    }
    .alert-bar.warning {
      background: rgba(218, 165, 32, 0.1);
      border-color: var(--gold);
      color: var(--gold);
    }
    .alert-bar.info {
      background: rgba(0, 119, 182, 0.1);
      border-color: var(--tertiary);
      color: var(--tertiary-light);
    }
    .alert-bar.success {
      background: rgba(34, 197, 94, 0.1);
      border-color: var(--secondary);
      color: var(--secondary);
    }

    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-light);
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 107, 53, 0.2);
      font-size: 13px;
      font-family: inherit;
      background: rgba(26, 39, 68, 0.5);
      color: var(--text-light);
      transition: all 0.2s ease;
    }
    .form-input::placeholder {
      color: var(--text-secondary);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.2);
      background: rgba(26, 39, 68, 0.7);
    }
    textarea.form-input {
      min-height: 100px;
      resize: vertical;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 28px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid rgba(255, 107, 53, 0.1);
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4);
    }
    .modal h3 {
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--text-light);
    }

    /* Audit log */
    .audit-item {
      display: flex;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 107, 53, 0.05);
    }
    .audit-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
      background: var(--primary);
    }
    .audit-content {
      flex: 1;
    }
    .audit-action {
      font-size: 14px;
      color: var(--text-light);
    }
    .audit-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .empty-state p {
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: rgba(255, 107, 53, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary-alt));
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Stepper */
    .stepper {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      overflow-x: auto;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 13px;
      white-space: nowrap;
    }
    .step-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;

      right: 20px;

      flex-direction: column;
      gap: 8px;
      pointer-events: none;

      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
