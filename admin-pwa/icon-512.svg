  <circle cx="440" cy="95" r="7" fill="#FF8F5E" opacity="0.5"/>
  <circle cx="395" cy="110" r="9" fill="#FF6B35" opacity="0.4"/>
  <circle cx="455" cy="145" r="5" fill="#FF8F5E" opacity="0.7"/>
  <circle cx="425" cy="170" r="6" fill="#FF6B35" opacity="0.3"/>
