  <!-- Outer hexagon (orange) -->
  <polygon points="256,70 420,115 420,265 256,310 92,265 92,115" fill="none" stroke="url(#hexOuter)" stroke-width="14" stroke-linejoin="round"/>
  <!-- Mid hexagon (green) -->
  <polygon points="256,88 404,128 404,252 256,292 108,252 108,128" fill="none" stroke="url(#hexMid)" stroke-width="10" stroke-linejoin="round"/>
  <!-- Inner hexagon (blue) -->
  <polygon points="256,104 390,140 390,240 256,276 122,240 122,140" fill="url(#hexInner)" fill-opacity="0.15" stroke="url(#hexInner)" stroke-width="7" stroke-linejoin="round"/>
  <!-- Dark fill inside -->
  <polygon points="256,114 380,146 380,234 256,266 132,234 132,146" fill="#0A1628" fill-opacity="0.9"/>
  <!-- 3 User silhouettes -->
  <circle cx="256" cy="155" r="18" fill="white"/>
  <circle cx="206" cy="166" r="14" fill="white" opacity="0.9"/>
  <circle cx="306" cy="166" r="14" fill="white" opacity="0.9"/>
  <path d="M256,177 C237,177 224,192 224,205 L288,205 C288,192 275,177 256,177Z" fill="white"/>
  <path d="M206,183 C192,183 183,194 183,204 L229,204 C229,194 220,183 206,183Z" fill="white" opacity="0.85"/>
  <path d="M306,183 C292,183 283,194 283,204 L329,204 C329,194 320,183 306,183Z" fill="white" opacity="0.85"/>
  <!-- Gear icon (golden) -->
  <g transform="translate(348,240)">
