<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A1628"/><stop offset="100%" stop-color="#0F1F3A"/></linearGradient>
    <linearGradient id="hexOuter" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF6B35"/><stop offset="100%" stop-color="#FF8F5E"/></linearGradient>
    <linearGradient id="hexMid" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22C55E"/><stop offset="100%" stop-color="#06D6A0"/></linearGradient>
    <linearGradient id="hexInner" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0077B6"/><stop offset="100%" stop-color="#48CAE4"/></linearGradient>
    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#B8860B"/><stop offset="100%" stop-color="#DAA520"/></linearGradient>
  </defs>
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Particles blue -->
  <circle cx="60" cy="370" r="11" fill="#48CAE4" opacity="0.6"/>
  <circle cx="90" cy="340" r="7" fill="#48CAE4" opacity="0.5"/>
  <circle cx="45" cy="400" r="9" fill="#0077B6" opacity="0.4"/>
  <circle cx="110" cy="390" r="5" fill="#48CAE4" opacity="0.7"/>
  <circle cx="75" cy="430" r="6" fill="#0077B6" opacity="0.3"/>
