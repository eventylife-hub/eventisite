    <circle cx="0" cy="0" r="8" fill="white"/>
    <rect x="-4" y="-28" width="8" height="12" rx="2" fill="url(#gearGrad)"/>
    <rect x="-4" y="16" width="8" height="12" rx="2" fill="url(#gearGrad)"/>
    <rect x="-28" y="-4" width="12" height="8" rx="2" fill="url(#gearGrad)"/>
    <rect x="16" y="-4" width="12" height="8" rx="2" fill="url(#gearGrad)"/>
    <rect x="12" y="-22" width="8" height="12" rx="2" fill="url(#gearGrad)" transform="rotate(45,16,-16)"/>
    <rect x="-20" y="10" width="8" height="12" rx="2" fill="url(#gearGrad)" transform="rotate(45,-16,16)"/>
    <rect x="-20" y="-22" width="8" height="12" rx="2" fill="url(#gearGrad)" transform="rotate(-45,-16,-16)"/>
    <rect x="12" y="10" width="8" height="12" rx="2" fill="url(#gearGrad)" transform="rotate(-45,16,16)"/>
