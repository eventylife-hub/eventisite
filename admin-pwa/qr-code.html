<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventy Admin — QR Code Installation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A1628;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg-particles span {
      position: absolute;
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
      opacity: 0.15;
    }
    .bg-particles span:nth-child(1) { width: 300px; height: 300px; background: #FF6B35; top: -100px; right: -100px; animation-delay: 0s; }
    .bg-particles span:nth-child(2) { width: 200px; height: 200px; background: #0077B6; bottom: -80px; left: -80px; animation-delay: 2s; }
    .bg-particles span:nth-child(3) { width: 150px; height: 150px; background: #22C55E; bottom: 20%; right: 10%; animation-delay: 4s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .hex-badge {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      position: relative;
    }
    .hex-badge svg { width: 100%; height: 100%; }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #FF6B35, #DAA520);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
    }

    .qr-container {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(255,107,53,0.2);
    }
    #qrcode { display: inline-block; }
    #qrcode img { border-radius: 8px; }

    .url-display {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 28px;
      word-break: break-all;
    }
    .url-display span { color: #FF6B35; font-weight: 600; }

    .instructions {
      text-align: left;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
    }
    .instructions h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF6B35, #DAA520);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .step-text {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
      padding-top: 2px;
    }
    .step-text strong { color: #fff; }

    .footer-tag {
      margin-top: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="bg-particles">
    <span></span><span></span><span></span>
  </div>

  <div class="card">
    <div class="hex-badge">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <polygon points="40,4 72,22 72,58 40,76 8,58 8,22" fill="none" stroke="#FF6B35" stroke-width="2.5" opacity="0.8"/>
        <polygon points="40,12 64,26 64,54 40,68 16,54 16,26" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.5"/>
        <polygon points="40,20 56,30 56,50 40,60 24,50 24,30" fill="rgba(0,119,182,0.15)" stroke="#0077B6" stroke-width="1.5"/>
        <circle cx="32" cy="38" r="4" fill="rgba(255,255,255,0.8)"/>
        <circle cx="40" cy="35" r="5" fill="rgba(255,255,255,0.9)"/>
        <circle cx="48" cy="38" r="4" fill="rgba(255,255,255,0.8)"/>
        <path d="M36,50 L40,44 L44,50" fill="none" stroke="#DAA520" stroke-width="2" stroke-linecap="round"/>
        <circle cx="40" cy="53" r="2" fill="#DAA520"/>
      </svg>
    </div>

    <h1>Eventy Admin</h1>
    <p class="subtitle">Application d'administration</p>

    <div class="qr-container">
      <div id="qrcode"></div>
    </div>

    <p class="url-display">
      <span>www.eventylife.fr</span>/admin-pwa/
    </p>

    <div class="instructions">
      <h3>Comment installer</h3>
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Scanne le QR code avec ton <strong>appareil photo</strong></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text"><strong>iPhone</strong> : Safari → Partager → "Sur l'écran d'accueil"</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text"><strong>Android</strong> : Chrome → Menu ⋮ → "Installer l'application"</div>
      </div>
    </div>

    <p class="footer-tag">Eventy © 2026 — Accès réservé aux administrateurs</p>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://www.eventylife.fr/admin-pwa/",
      width: 200,
      height: 200,
      colorDark: "#0A1628",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
