<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventy Life — PWA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FF6B35 0%, #F7931E 50%, #FFB347 100%);
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem; }
    .links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block;
      padding: 1rem 2rem;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.2s;
    }
    a:hover { background: rgba(255,255,255,0.35); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Eventy Life</h1>
    <p>Le voyage de groupe où tu n'as rien à gérer, tout à vivre.</p>
    <div class="links">
      <a href="/admin-pwa/">Admin PWA</a>
      <a href="/pro-pwa/">Pro PWA</a>
    </div>
  </div>
</body>
</html>
