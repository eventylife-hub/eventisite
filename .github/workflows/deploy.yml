# Pipeline de déploiement en production pour Eventy Life
name: Deploy - Déploiement en Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ===== JOB BUILD & PUSH IMAGES =====
  build:
    name: Build - Construire & Pousser les Images Docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      short-sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Vérifier le code source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Récupérer le SHA court
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Se connecter à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer les métadonnées - Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Générer les métadonnées - Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Construire - Backend (avant Trivy)
        uses: docker/build-push-action@v5
        with:
          context: backend
          load: true
          tags: eventy-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scanner Backend avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eventy-backend:latest
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL

      - name: Construire et pousser - Backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construire - Frontend (avant Trivy)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          load: true
          tags: eventy-frontend:latest
          cache-from: type=gha
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLIC_KEY }}

      - name: Scanner Frontend avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eventy-frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL

      - name: Construire et pousser - Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLIC_KEY }}

  # ===== JOB DEPLOY =====
  deploy:
    name: Deploy - Déployer en Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Vérifier le code source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # SECURITY FIX: Passer les secrets via envs et non interpolation dans le script
      - name: Déployer en production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY,SHORT_SHA
          script: |
            set -euo pipefail

            cd ~/eventy-life || exit 1

            echo "=== Déploiement Eventy Life — SHA: $SHORT_SHA ==="

            # 1. Sauvegarder les images actuelles pour rollback
            CURRENT_BACKEND=$(docker inspect --format='{{.Image}}' eventisite-app 2>/dev/null || echo "none")
            CURRENT_FRONTEND=$(docker inspect --format='{{.Image}}' eventisite-frontend 2>/dev/null || echo "none")
            echo "Images actuelles: backend=$CURRENT_BACKEND frontend=$CURRENT_FRONTEND"

            # 2. Se connecter au registre de conteneurs
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # 3. Télécharger les nouvelles images
            docker pull "ghcr.io/${GITHUB_REPOSITORY}/backend:latest"
            docker pull "ghcr.io/${GITHUB_REPOSITORY}/frontend:latest"

            # 4. Exécuter les migrations Prisma AVANT le déploiement
            echo "Exécution des migrations Prisma..."
            docker run --rm \
              --network host \
              -e DATABASE_URL="${DATABASE_URL}" \
              "ghcr.io/${GITHUB_REPOSITORY}/backend:latest" \
              npx prisma migrate deploy || {
                echo "⚠️ Migration Prisma échouée — annulation du déploiement"
                exit 1
              }
            echo "✅ Migrations Prisma appliquées"

            # 5. Arrêter et redémarrer avec les nouvelles images
            docker compose down || true
            docker compose up -d

            # 5. Vérification de santé avec retry (max 60s)
            echo "Attente du démarrage..."
            HEALTHY=false
            for i in $(seq 1 12); do
              sleep 5
              BACKEND_OK=false
              FRONTEND_OK=false
              if curl -sf http://localhost:4000/api/health > /dev/null 2>&1; then
                BACKEND_OK=true
              fi
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                FRONTEND_OK=true
              fi
              if [ "$BACKEND_OK" = true ] && [ "$FRONTEND_OK" = true ]; then
                HEALTHY=true
                echo "✅ Health check OK (backend + frontend) après $((i * 5))s"
                break
              fi
              echo "  Tentative $i/12... backend=$BACKEND_OK frontend=$FRONTEND_OK"
            done

            if [ "$HEALTHY" = false ]; then
              echo "❌ Health check échoué après 60s — ROLLBACK"
              docker compose down || true

              # Rollback vers les images précédentes si disponibles
              if [ "$CURRENT_BACKEND" != "none" ]; then
                echo "Rollback vers les images précédentes..."
                docker compose up -d
                echo "⚠️ Rollback effectué — vérifier manuellement"
              fi

              exit 1
            fi

            # 6. Nettoyage des anciennes images
            docker image prune -f --filter "until=72h" 2>/dev/null || true

            echo "=== Déploiement terminé avec succès ==="
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SHORT_SHA: ${{ needs.build.outputs.short-sha }}
