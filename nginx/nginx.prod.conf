# Nginx — Configuration production Eventy Life
# Reverse proxy : Front (3000) + Back (4000)
# TLS : Certificats Let's Encrypt via certbot

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name eventylife.fr www.eventylife.fr api.eventylife.fr;

    # ACME challenge Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend — eventylife.fr ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eventylife.fr www.eventylife.fr;

    # Certificats SSL
    ssl_certificate     /etc/nginx/certs/eventylife.fr/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/eventylife.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Headers sécurité
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Logs
    access_log /var/log/nginx/eventy-frontend-access.log;
    error_log  /var/log/nginx/eventy-frontend-error.log warn;

    # Taille max upload (photos profil, documents)
    client_max_body_size 10M;

    # Proxy vers Next.js
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Cache Next.js static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend:3000;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}

# ─── Backend API — api.eventylife.fr ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.eventylife.fr;

    ssl_certificate     /etc/nginx/certs/api.eventylife.fr/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/api.eventylife.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff" always;

    access_log /var/log/nginx/eventy-api-access.log;
    error_log  /var/log/nginx/eventy-api-error.log warn;

    # Limite stricte sur les uploads
    client_max_body_size 25M;

    # Rate limiting (protection DDoS + brute force)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=checkout:10m rate=20r/m;

    limit_req zone=api burst=20 nodelay;

    # Auth endpoints — rate limit strict (brute force protection)
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    location /api/auth/register {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    location /api/auth/forgot-password {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Checkout — rate limit modéré (éviter les abus)
    location /api/checkout/ {
        limit_req zone=checkout burst=10 nodelay;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Stripe webhook — raw body requis, pas de rate limit agressif
    location /api/payments/webhook {
        limit_req zone=api burst=50;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API principale
    location /api/ {
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # CORS préflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "https://eventylife.fr" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Idempotency-Key, X-CSRF-Token" always;
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
    }

    # Swagger — désactivé en production (activé uniquement si SWAGGER_ENABLED=true)
    location /api/docs {
        return 403 "Documentation non disponible en production";
    }
}
